name: Deploy Malangan

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Hostinger
    runs-on: ubuntu-latest

    steps:
      - name: Get latest code
        uses: actions/checkout@v4

      - name: Sync files to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /
          security: loose
          exclude: |
            **/.env
            **/vendor/**
            **/node_modules/**
            **/storage/framework/cache/**
            **/storage/framework/sessions/**
            **/storage/framework/views/**
            .git*
          state-name: .ftp-deploy-sync-state.json

      - name: Post-deploy commands via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd ${{ secrets.SSH_REMOTE_PATH }}
            PHP=$(find /usr/local/php* /usr/bin -name "php*" -type f 2>/dev/null | grep -E "php8[0-9.]*(bin/php|php)$" | head -1)
            [ -z "$PHP" ] && PHP=$(which php)
            echo "Using PHP: $PHP"
            $PHP -v
            COMPOSER=$(which composer 2>/dev/null || echo "/usr/local/bin/composer")
            $PHP $COMPOSER install --no-dev --optimize-autoloader --no-interaction
            $PHP artisan migrate --force
            $PHP artisan optimize:clear
            $PHP artisan optimize
