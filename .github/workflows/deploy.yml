name: Deploy Malangan

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Hostinger
    runs-on: ubuntu-latest

    steps:
      - name: Get latest code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # Cek apakah composer.lock berubah di commit ini
      - name: Check if composer.lock changed
        id: composer_changed
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q "composer.lock"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      # Install vendor hanya kalau composer.lock berubah
      - name: Setup PHP
        if: steps.composer_changed.outputs.changed == 'true'
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install Composer dependencies
        if: steps.composer_changed.outputs.changed == 'true'
        run: composer install --no-dev --optimize-autoloader --no-interaction

      # Upload vendor (hanya kalau composer.lock berubah)
      - name: Sync vendor via FTP
        if: steps.composer_changed.outputs.changed == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./vendor/
          server-dir: /vendor/
          security: loose
          state-name: .ftp-deploy-sync-state-vendor.json

      # Upload file aplikasi (selalu, tapi exclude vendor & node_modules)
      - name: Sync app files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /
          security: loose
          exclude: |
            **/.env
            **/vendor/**
            **/node_modules/**
            **/storage/framework/cache/**
            **/storage/framework/sessions/**
            **/storage/framework/views/**
            .git*
          state-name: .ftp-deploy-sync-state.json

      # Clear cache di server
      - name: Clear Laravel cache via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd ${{ secrets.SSH_REMOTE_PATH }}
            php artisan optimize:clear
            php artisan optimize
